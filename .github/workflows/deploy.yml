name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to Hetzner VPS
        id: deploy1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2203
          timeout: 60s
          command_timeout: 15m
          script: |
            cd /var/www/lindy_ai
            if [ -f scripts/deploy.sh ]; then
              bash scripts/deploy.sh
            else
              bash deploy.sh
            fi

      - name: Retry deploy if first attempt failed
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2203
          timeout: 60s
          command_timeout: 15m
          script: |
            sleep 10
            cd /var/www/lindy_ai
            if [ -f scripts/deploy.sh ]; then
              bash scripts/deploy.sh
            else
              bash deploy.sh
            fi

      - name: Mark job failed if both attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome != 'success'
        run: exit 1
