# Reusable Alexa chat test job — called from CI and Deploy workflows.
name: Alexa Chat Tests

on:
  workflow_call:

jobs:
  alexa-chat-tests:
    name: Alexa chat tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hard chat regression suite
        run: npm run test:chat
        env:
          CHAT_TEST_SKIP_LLM: "1"

      - name: Quick chat smoke tests
        run: npm run test:chat:quick
        env:
          CHAT_TEST_SKIP_LLM: "1"
